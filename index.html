<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader Pro</title>
    <style>
        :root { --primary: #fe2c55; --dark: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; font-size: 16px; }
        button { width: 95%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .result-card { margin-top: 25px; padding: 15px; border: 1px solid #333; border-radius: 15px; display: none; }
        img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .btn-dl { display: block; margin: 10px 0; padding: 10px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn-video { background: #00f2ea; color: #000; }
        .btn-music { background: #ffea00; color: #000; }
        #loading { display: none; margin-top: 10px; color: #00f2ea; }
    </style>
</head>
<body>

<div class="container">
    <h2>TikTok Downloader</h2>
    <p style="font-size: 0.9rem; opacity: 0.7;">Download Video (No WM) & Musik MP3</p>
    
    <input type="text" id="tiktokUrl" placeholder="Tempel link TikTok di sini...">
    <button onclick="downloadTikTok()" id="mainBtn">AMBIL MEDIA</button>
    
    <div id="loading">Sedang memproses data...</div>

    <div id="result" class="result-card">
        <img id="resCover" src="" alt="Thumbnail">
        <h4 id="resTitle" style="margin: 10px 0;"></h4>
        <p id="resAuthor" style="font-size: 0.8rem; color: #aaa;"></p>
        
        <a id="dlVideo" href="#" class="btn-dl btn-video">⬇️ VIDEO (TANPA WM)</a>
        <a id="dlMusic" href="#" class="btn-dl btn-music">🎵 DOWNLOAD LAGU (MP3)</a>
    </div>
</div>

<script>
    async function downloadTikTok() {
        const url = document.getElementById('tiktokUrl').value;
        const mainBtn = document.getElementById('mainBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');

        if (!url) return alert("Masukkan link dulu!");

        // UI Feedback
        mainBtn.disabled = true;
        loading.style.display = "block";
        result.style.display = "none";

        try {
            const response = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            const resData = await response.json();

            if (!resData.success) throw new Error(resData.error);

            // Tampilkan Data
            document.getElementById('resCover').src = resData.data.cover;
            document.getElementById('resTitle').innerText = resData.data.title;
            document.getElementById('resAuthor').innerText = "By: " + resData.data.author;
            
            // Link Download
            document.getElementById('dlVideo').href = resData.data.video_no_wm;
            document.getElementById('dlMusic').href = resData.data.music_url;

            result.style.display = "block";
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            mainBtn.disabled = false;
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
